# Full sqitch.conf with all features
[core]
    engine = pg
    top_dir = migrations
    plan_file = migrations/sqitch.plan

[engine "pg"]
    target = db:pg:mydb
    client = /usr/bin/psql

[deploy]
    verify = true
    mode = change

[target "production"]
    uri = db:pg://user@host/dbname

[target "staging"]
    uri = db:pg://user:pass@staging.example.com:5432/mydb
